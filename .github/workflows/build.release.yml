name: build.release

# Release build pipeline — mirrors devcell-sh/devcell's pattern. Fires
# when a GitHub release is created (typically: tag a `v*` and click
# "Create release" on the draft goreleaser produced). Cuts the production
# release and pushes the `addiplay` Homebrew Cask to dimmkirr/homebrew-tap.

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cell-release:
    name: addiplay release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set env
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Run GoReleaser (release)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SHORT_SHA: ${{ env.SHORT_SHA }}

      - name: Publish release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_VERSION}" --draft=false --latest=true

  e2e-install:
    name: addiplay brew install (${{ matrix.arch }})
    needs: cell-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Download addiplay binary
        run: |
          # GITHUB_REF_NAME is e.g. "v0.1.0"; goreleaser archive uses
          # the version without the leading "v".
          STRIPPED="${VERSION#v}"
          TARBALL="addiplay_${STRIPPED}_linux_${{ matrix.arch }}.tar.gz"
          URL="https://github.com/dimmkirr/addiplay/releases/download/${VERSION}/${TARBALL}"
          echo "Downloading: ${URL}"
          curl -fsSL -o "${TARBALL}" "${URL}"
          tar xzf "${TARBALL}"
          chmod +x addiplay
          sudo mv addiplay /usr/local/bin/addiplay

      - name: Verify binary
        run: |
          OUTPUT=$(addiplay --version 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "v?[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "--- PASS: addiplay version found ---"
          else
            echo "--- FAIL: addiplay version string not found ---"
            exit 1
          fi
