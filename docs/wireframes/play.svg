<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <title>ADDIPLAY — Play screen (now playing)</title>
  <desc>Wireframe: channel selected, stream playing; channel list shrinks to leave room for the art column.</desc>

  <defs>
    <!-- album-cover placeholder gradient: stand-in for the actual fanart image -->
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="50%" stop-color="#288cfb"/>
      <stop offset="100%" stop-color="#0a1530"/>
    </linearGradient>
    <linearGradient id="coverGrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="720" fill="#f7f8fa"/>

  <text x="28" y="38" font-size="14" fill="#6b7280" font-weight="500" letter-spacing="0.08em">PLAY · NOW PLAYING</text>
  <text x="28" y="58" font-size="11" fill="#9aa3b2">Channel is streaming. Right column shows the per-track album cover (track_history.art_url), falling back to channel art when absent.</text>

  <g transform="translate(28,80)">
    <rect x="2" y="3" width="1044" height="592" rx="10" fill="#000" opacity="0.07"/>
    <rect x="0" y="0" width="1044" height="28" rx="10" fill="#1f2632"/>
    <rect x="0" y="14" width="1044" height="14" fill="#1f2632"/>
    <circle cx="16" cy="14" r="6" fill="#ff5f57"/>
    <circle cx="36" cy="14" r="6" fill="#febc2e"/>
    <circle cx="56" cy="14" r="6" fill="#28c840"/>
    <text x="522" y="18" text-anchor="middle" font-size="10" fill="#6b7280">addiplay · classic trance</text>

    <rect x="0" y="28" width="1044" height="564" fill="#151b25"/>

    <g transform="translate(12,40)" font-size="14" fill="#e6e6e6" xml:space="preserve">

      <!-- HEADER -->
      <rect x="0" y="-13" width="42" height="18" fill="#288cfb"/>
      <text x="4" y="0" fill="#151b25" font-weight="700">ADDIPLAY</text>
      <text x="51" y="0" fill="#e6e6e6" font-weight="700">DI.FM</text>
      <text x="110" y="0" fill="#888">·</text>
      <text x="125" y="0" fill="#288cfb" font-weight="700" text-decoration="underline">All</text>
      <text x="156" y="0" fill="#888">Favorites</text>
      <text x="1015" y="0" text-anchor="end" fill="#888">▶  playing</text>

      <!-- BODY: channel list (left) + art column (right) -->

      <!-- LEFT: channel list, narrower -->
      <g transform="translate(0,18)">
        <text x="0" y="0" fill="#288cfb">╭─ Channels ────────────────────────────────────────────────────────────────╮</text>

        <rect x="9" y="6" width="630" height="20" fill="#288cfb"/>
        <text x="14" y="20" fill="#151b25" font-weight="700">▸ Classic Trance</text>
        <text x="640" y="20" fill="#151b25">★</text>

        <text x="0"  y="40" fill="#288cfb">│</text>
        <text x="14" y="40">  Vocal Trance</text>
        <text x="654" y="40" fill="#288cfb">│</text>

        <text x="0"  y="60" fill="#288cfb">│</text>
        <text x="14" y="60">  Progressive</text>
        <text x="654" y="60" fill="#288cfb">│</text>

        <text x="0"  y="80" fill="#288cfb">│</text>
        <text x="14" y="80">  Trance</text>
        <text x="654" y="80" fill="#288cfb">│</text>

        <text x="0"  y="100" fill="#288cfb">│</text>
        <text x="14" y="100">  Psybient</text>
        <text x="654" y="100" fill="#288cfb">│</text>

        <text x="0"  y="120" fill="#288cfb">│</text>
        <text x="14" y="120">  Hard Dance</text>
        <text x="654" y="120" fill="#288cfb">│</text>

        <text x="0"  y="140" fill="#288cfb">│</text>
        <text x="14" y="140">  DJ Mixes</text>
        <text x="654" y="140" fill="#288cfb">│</text>

        <text x="0"  y="160" fill="#288cfb">│</text>
        <text x="14" y="160">  Vocal Lounge</text>
        <text x="654" y="160" fill="#288cfb">│</text>

        <text x="0"  y="180" fill="#288cfb">│</text>
        <text x="14" y="180">  Future Garage</text>
        <text x="654" y="180" fill="#288cfb">│</text>

        <text x="0"  y="200" fill="#288cfb">│</text>
        <text x="14" y="200">  Liquid DnB</text>
        <text x="654" y="200" fill="#288cfb">│</text>

        <text x="0"  y="220" fill="#288cfb">│</text>
        <text x="14" y="220">  Chillout</text>
        <text x="640" y="220" fill="#888">  ★</text>
        <text x="654" y="220" fill="#288cfb">│</text>

        <text x="0"  y="240" fill="#288cfb">│</text>
        <text x="14" y="240">  Deep House</text>
        <text x="640" y="240" fill="#888">  ★</text>
        <text x="654" y="240" fill="#288cfb">│</text>

        <text x="0"  y="260" fill="#288cfb">│</text>
        <text x="654" y="260" fill="#288cfb">│</text>
        <text x="0"  y="280" fill="#288cfb">│</text>
        <text x="654" y="280" fill="#288cfb">│</text>
        <text x="0"  y="300" fill="#288cfb">│</text>
        <text x="654" y="300" fill="#288cfb">│</text>
        <text x="0"  y="320" fill="#288cfb">│</text>
        <text x="654" y="320" fill="#288cfb">│</text>
        <text x="0"  y="340" fill="#888" font-style="italic">│   ⋮ scroll for more</text>
        <text x="654" y="340" fill="#288cfb">│</text>
        <text x="0"  y="360" fill="#288cfb">│</text>
        <text x="654" y="360" fill="#288cfb">│</text>

        <text x="0" y="380" fill="#288cfb">╰───────────────────────────────────────────────────────────────────────────╯</text>
      </g>

      <!-- RIGHT: art column / now-playing panel -->
      <g transform="translate(674,18)">
        <text x="0" y="0" fill="#288cfb">╭─ Now Playing ───────────────────────────╮</text>

        <!-- album art block (square; 30 cells wide × 15 rows ≈ 256x270 px in mockup) -->
        <rect x="14" y="14" width="318" height="220" fill="url(#cover)"/>
        <rect x="14" y="14" width="318" height="220" fill="url(#coverGrain)"/>
        <!-- art label tucked bottom-right of the cover so it reads as "image placeholder" -->
        <text x="324" y="226" text-anchor="end" font-size="10" fill="#e6e6e6" opacity="0.7">album cover · 217×217</text>

        <!-- channel label (bold, accent) -->
        <text x="14" y="262" fill="#e6e6e6" font-weight="700">Classic Trance</text>
        <!-- channel tagline -->
        <text x="14" y="280" fill="#888">the classics that built the genre</text>

        <!-- spacer -->

        <!-- track: artist (bold) + title (muted) -->
        <text x="14" y="312" fill="#e6e6e6" font-weight="700">FilterFunk</text>
        <text x="22" y="332" fill="#888">S.O.S. (Message In A Bottle)</text>

        <!-- border verticals -->
        <text x="0"   y="40"  fill="#288cfb">│</text>
        <text x="346" y="40"  fill="#288cfb">│</text>
        <text x="0"   y="60"  fill="#288cfb">│</text>
        <text x="346" y="60"  fill="#288cfb">│</text>
        <text x="0"   y="80"  fill="#288cfb">│</text>
        <text x="346" y="80"  fill="#288cfb">│</text>
        <text x="0"   y="100" fill="#288cfb">│</text>
        <text x="346" y="100" fill="#288cfb">│</text>
        <text x="0"   y="120" fill="#288cfb">│</text>
        <text x="346" y="120" fill="#288cfb">│</text>
        <text x="0"   y="140" fill="#288cfb">│</text>
        <text x="346" y="140" fill="#288cfb">│</text>
        <text x="0"   y="160" fill="#288cfb">│</text>
        <text x="346" y="160" fill="#288cfb">│</text>
        <text x="0"   y="180" fill="#288cfb">│</text>
        <text x="346" y="180" fill="#288cfb">│</text>
        <text x="0"   y="200" fill="#288cfb">│</text>
        <text x="346" y="200" fill="#288cfb">│</text>
        <text x="0"   y="220" fill="#288cfb">│</text>
        <text x="346" y="220" fill="#288cfb">│</text>
        <text x="0"   y="240" fill="#288cfb">│</text>
        <text x="346" y="240" fill="#288cfb">│</text>
        <text x="0"   y="260" fill="#288cfb">│</text>
        <text x="346" y="260" fill="#288cfb">│</text>
        <text x="0"   y="280" fill="#288cfb">│</text>
        <text x="346" y="280" fill="#288cfb">│</text>
        <text x="0"   y="300" fill="#288cfb">│</text>
        <text x="346" y="300" fill="#288cfb">│</text>
        <text x="0"   y="320" fill="#288cfb">│</text>
        <text x="346" y="320" fill="#288cfb">│</text>
        <text x="0"   y="340" fill="#288cfb">│</text>
        <text x="346" y="340" fill="#288cfb">│</text>
        <text x="0"   y="360" fill="#288cfb">│</text>
        <text x="346" y="360" fill="#288cfb">│</text>

        <text x="0" y="380" fill="#288cfb">╰─────────────────────────────────────────╯</text>
      </g>

      <!-- STATUS BAR -->
      <rect x="0" y="414" width="1020" height="20" fill="#212737"/>
      <text x="8"    y="428" fill="#e6e6e6">▶  playing</text>
      <text x="180"  y="428" fill="#888">network: di.fm   ·   channel: classictrance   ·   premium_high 256k</text>
      <text x="1012" y="428" text-anchor="end" fill="#e6e6e6">vol 60% ▮▮▮▮▮▮▯▯▯▯</text>

      <!-- KEY HINTS -->
      <text x="0" y="452" fill="#888">↑↓ select   enter play   space pause   n network   / search   f favorite   +/- volume   q quit</text>
    </g>
  </g>

  <text x="28" y="700" font-size="10" fill="#9aa3b2">Art source priority: track_history.art_url (per-song) → channel.images.square → channel.images.default → channel.asset_url</text>
</svg>
