<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <title>ADDIPLAY — Network picker</title>
  <desc>Wireframe: opened with `n`. Centered modal listing every AudioAddict network with its theme accent swatch. Esc to cancel.</desc>

  <rect width="1100" height="720" fill="#f7f8fa"/>

  <text x="28" y="38" font-size="14" fill="#6b7280" font-weight="500" letter-spacing="0.08em">NETWORK · PICKER OVERLAY</text>
  <text x="28" y="58" font-size="11" fill="#9aa3b2">Triggered by `n`. The background view (channel list) is dimmed; the picker centers over it. Each row shows the network's accent color as a swatch so the chosen theme is previewable.</text>

  <g transform="translate(28,80)">
    <rect x="2" y="3" width="1044" height="592" rx="10" fill="#000" opacity="0.07"/>
    <rect x="0" y="0" width="1044" height="28" rx="10" fill="#1f2632"/>
    <rect x="0" y="14" width="1044" height="14" fill="#1f2632"/>
    <circle cx="16" cy="14" r="6" fill="#ff5f57"/>
    <circle cx="36" cy="14" r="6" fill="#febc2e"/>
    <circle cx="56" cy="14" r="6" fill="#28c840"/>
    <text x="522" y="18" text-anchor="middle" font-size="10" fill="#6b7280">addiplay · switch network</text>

    <!-- terminal body: render the dimmed background, then the modal on top -->
    <rect x="0" y="28" width="1044" height="564" fill="#151b25"/>

    <!-- DIMMED BACKGROUND (ghost of channel list, low opacity) -->
    <g transform="translate(12,40)" font-size="14" fill="#e6e6e6" xml:space="preserve" opacity="0.18">
      <rect x="0" y="-13" width="42" height="18" fill="#288cfb"/>
      <text x="4" y="0" fill="#151b25" font-weight="700">ADDIPLAY</text>
      <text x="51" y="0" fill="#e6e6e6" font-weight="700">DI.FM</text>

      <g transform="translate(0,18)">
        <text x="0" y="0" fill="#288cfb">╭─ Channels ─────────────────────────────────────────────────────────────────────────────────────────────────────────╮</text>
        <text x="14" y="20">▸ Classic Trance</text>
        <text x="14" y="40">  Vocal Trance</text>
        <text x="14" y="60">  Progressive</text>
        <text x="14" y="80">  Trance</text>
        <text x="14" y="100">  Psybient</text>
        <text x="14" y="120">  Hard Dance</text>
        <text x="14" y="140">  DJ Mixes</text>
        <text x="14" y="160">  Vocal Lounge</text>
        <text x="14" y="180">  Future Garage</text>
        <text x="14" y="200">  Liquid DnB</text>
        <text x="0" y="380" fill="#288cfb">╰────────────────────────────────────────────────────────────────────────────────────────────────────────────────────╯</text>
      </g>
      <rect x="0" y="432" width="1020" height="20" fill="#212737"/>
    </g>

    <!-- MODAL OVERLAY (centered) -->
    <g transform="translate(322,80)" font-size="14" xml:space="preserve">

      <!-- subtle drop-shadow under the modal -->
      <rect x="3" y="4" width="400" height="404" rx="6" fill="#000" opacity="0.35"/>

      <!-- modal panel -->
      <rect x="0" y="0" width="400" height="404" rx="6" fill="#151b25" stroke="#288cfb" stroke-width="1.5"/>

      <!-- title -->
      <text x="20" y="32" fill="#e6e6e6" font-weight="700">Switch network</text>
      <text x="20" y="50" fill="#888">──────────────────────────────────────</text>

      <!-- rows: swatch + name; current cursor is row 0 (di.fm), arrow + bold + accent -->

      <!-- DI.FM (selected) -->
      <text x="20" y="86" fill="#288cfb" font-weight="700">▸</text>
      <rect x="38" y="74" width="18" height="14" fill="#288cfb"/>
      <text x="64" y="86" fill="#288cfb" font-weight="700">DI.fm</text>
      <text x="368" y="86" text-anchor="end" fill="#666">119 channels</text>

      <text x="38" y="112" fill="#fff" opacity="0"></text>
      <rect x="38" y="100" width="18" height="14" fill="#eb8700"/>
      <text x="64" y="112" fill="#e6e6e6">RadioTunes</text>

      <rect x="38" y="126" width="18" height="14" fill="#f9dc00"/>
      <text x="64" y="138" fill="#e6e6e6">RockRadio</text>

      <rect x="38" y="152" width="18" height="14" fill="#e8a548"/>
      <text x="64" y="164" fill="#e6e6e6">JazzRadio</text>

      <rect x="38" y="178" width="18" height="14" fill="#3ac6a1"/>
      <text x="64" y="190" fill="#e6e6e6">ClassicalRadio</text>

      <rect x="38" y="204" width="18" height="14" fill="#15afa7"/>
      <text x="64" y="216" fill="#e6e6e6">ZenRadio</text>

      <rect x="38" y="230" width="18" height="14" fill="#ec8f3c"/>
      <text x="64" y="242" fill="#e6e6e6">FrescaTune</text>

      <!-- separator -->
      <text x="20" y="290" fill="#888">──────────────────────────────────────</text>

      <!-- key hints inside modal -->
      <text x="20" y="318" fill="#888">↑↓ select</text>
      <text x="160" y="318" fill="#888">enter switch</text>
      <text x="300" y="318" fill="#888">esc cancel</text>

      <!-- footnote: theme preview -->
      <text x="20" y="356" fill="#666" font-size="11">Picking a network re-themes the whole UI (header,</text>
      <text x="20" y="372" fill="#666" font-size="11">accents, selection highlight) before channels load.</text>
    </g>
  </g>

  <text x="28" y="700" font-size="10" fill="#9aa3b2">Each network's theme lives in internal/ui/theme.go — accents are pulled from the AudioAddict brand palette.</text>
</svg>
